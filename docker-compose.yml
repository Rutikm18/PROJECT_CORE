# =============================================================================
#  docker-compose.yml — Jarvis Manager (Caddy reverse proxy + Manager)
#
#  SETUP (run once before first boot):
#    bash env.sh          ← generates .env + Caddyfile interactively
#
#  START:
#    docker compose up -d
#
#  LOGS:
#    docker compose logs -f
#
#  ARCHITECTURE:
#    Internet → Caddy (TLS) → manager (plain HTTP, internal only)
#
#    Caddy handles all TLS — either:
#      • Self-signed internal cert (IP-only, port 8443)
#      • Let's Encrypt cert (domain, port 443)
#
#    Manager is NOT directly exposed to the internet.
#    Only Caddy can reach it via Docker internal network.
# =============================================================================

services:

  # ── TLS reverse proxy ────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: jarvis-caddy
    restart: unless-stopped

    # Exposes the public-facing port(s) set by env.sh:
    #   8443 → self-signed (IP-only mode)
    #   443  → Let's Encrypt (domain mode)
    ports:
      - "${BIND_PORT:-8443}:${BIND_PORT:-8443}"
      - "80:80"     # needed for Let's Encrypt ACME HTTP-01 challenge

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro   # generated by env.sh
      - caddy_data:/data                       # ACME certs + Caddy state
      - caddy_config:/config                   # Caddy runtime config

    networks:
      - jarvis_internal

    depends_on:
      manager:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Application ──────────────────────────────────────────────────────────────
  manager:
    build:
      context: .
      dockerfile: manager/Dockerfile
    image: jarvis-manager:latest
    container_name: jarvis-manager
    restart: unless-stopped

    # Manager exposed on 8080 for direct agent access (no TLS — use on trusted networks)
    # Also reachable via Caddy on :8443 (HTTPS) or :80 (HTTP)
    ports:
      - "8080:8080"

    environment:
      PUBLIC_IP:               "${PUBLIC_IP:-}"
      DOMAIN:                  "${DOMAIN:-}"

      ENROLLMENT_TOKENS:       "${ENROLLMENT_TOKENS:-}"
      ADMIN_TOKEN:             "${ADMIN_TOKEN:-}"
      OPEN_ENROLLMENT:         "${OPEN_ENROLLMENT:-true}"

      DEFAULT_KEY_EXPIRY_DAYS: "${DEFAULT_KEY_EXPIRY_DAYS:-0}"

      LOG_LEVEL:               "${LOG_LEVEL:-info}"
      LOG_FILE:                "/app/logs/manager.log"
      DATA_DIR:                "/app/data"
      CORS_ORIGINS:            "${CORS_ORIGINS:-*}"

      # Manager always runs plain HTTP — Caddy handles TLS
      BIND_PORT:               "8080"
      TLS_MODE:                "none"

    volumes:
      - ./data:/app/data      # SQLite DBs, .secrets, hot/warm/cold store
      - ./logs:/app/logs      # Rotating log files

    networks:
      - jarvis_internal

    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  caddy_data:    # Caddy ACME certificates + state (survives restarts)
  caddy_config:  # Caddy runtime config cache

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  jarvis_internal:
    driver: bridge
    # Manager has no public IP — only reachable from caddy via this network
    internal: false   # set true to block all outbound internet from manager
