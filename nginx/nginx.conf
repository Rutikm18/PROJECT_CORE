# ── AttackLens Manager — Nginx Load Balancer ─────────────────────────────────
#
# Architecture: Active-Active (2 manager replicas) + RabbitMQ queue.
#   Nginx terminates TLS and distributes HTTP+WS traffic across replicas.
#   Session stickiness uses ip_hash for WebSocket connections (same agent
#   always hits the same replica → no WS fanout needed across replicas).
#
#   ┌──────────────┐      HTTPS/WSS       ┌──────────────────┐
#   │  Agents /    │ ──────────────────→  │  Nginx (TLS)     │
#   │  Dashboard   │                      │  port 443        │
#   └──────────────┘                      └────────┬─────────┘
#                                                  │  upstream (round-robin / ip_hash)
#                                        ┌─────────┴──────────┐
#                                        ↓                    ↓
#                                 ┌────────────┐      ┌────────────┐
#                                 │ manager-1  │      │ manager-2  │
#                                 │ :8443      │      │ :8443      │
#                                 └─────┬──────┘      └──────┬─────┘
#                                       │   RabbitMQ AMQP    │
#                                       └────────┬───────────┘
#                                                │
#                                        ┌───────┴──────┐
#                                        │  RabbitMQ    │
#                                        │  (HA queues) │
#                                        └──────────────┘
#
# Failure modes handled:
#   • Manager crash       → Nginx upstream health checks remove it in ≤5s
#   • Manager restart     → Agents reconnect; DB nonce table prevents replay
#   • RabbitMQ restart    → Workers reconnect with exponential back-off
#   • DB write contention → SQLitePool write lock; queue buffers traffic

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Connection tuning ─────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    reset_timedout_connection on;

    # ── Request limits ────────────────────────────────────────────────────
    client_max_body_size    16m;   # agent payloads up to 16MB (compressed)
    client_body_buffer_size 256k;
    client_header_timeout   10s;
    client_body_timeout     30s;
    send_timeout            30s;

    # ── Rate limiting zones (nginx-level, coarse-grained) ─────────────────
    # Fine-grained per-agent limiting is done inside the manager (token bucket).
    # Nginx zones protect against DDoS before traffic hits Python.
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=api:10m    rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 50;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ua=$upstream_addr us=$upstream_status';
    access_log /var/log/nginx/access.log main;

    # ── Upstream: HTTP API + dashboard ────────────────────────────────────
    upstream manager_http {
        # round-robin for API requests (stateless)
        least_conn;
        server manager-1:8443 max_fails=2 fail_timeout=10s;
        server manager-2:8443 max_fails=2 fail_timeout=10s backup;

        # Keep connections alive to manager (avoids TLS handshake per request)
        keepalive 32;
    }

    # ── Upstream: WebSocket (ip_hash for sticky routing) ──────────────────
    upstream manager_ws {
        # Agents must hit the same replica for the lifetime of their WS session.
        ip_hash;
        server manager-1:8443;
        server manager-2:8443;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS configuration (provide certs via volume mount)
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (1 year)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── WebSocket endpoint (agent connections) ─────────────────────────
        location /ws/ {
            proxy_pass              https://manager_ws;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade $http_upgrade;
            proxy_set_header        Connection "upgrade";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_read_timeout      3600s;   # keep WS alive for 1h
            proxy_send_timeout      3600s;
            proxy_connect_timeout   10s;

            # Disable buffering for real-time events
            proxy_buffering         off;
            proxy_cache             off;
        }

        # ── Ingest endpoint (agent POST payloads) ─────────────────────────
        location /api/v1/ingest {
            limit_req zone=ingest burst=80 nodelay;
            limit_req_status 429;

            proxy_pass              https://manager_http;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout      30s;
            proxy_connect_timeout   5s;
            proxy_next_upstream     error timeout http_502 http_503;
        }

        # ── API endpoints (dashboard, SOC workflow) ───────────────────────
        location /api/ {
            limit_req zone=api burst=150 nodelay;

            proxy_pass              https://manager_http;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout      60s;
            proxy_connect_timeout   5s;
            proxy_next_upstream     error timeout http_502 http_503;

            # Cache GET responses for dashboard metrics (5s)
            proxy_cache_valid       200 5s;
            proxy_cache_bypass      $http_cache_control;
        }

        # ── Dashboard static assets ────────────────────────────────────────
        location /static/ {
            proxy_pass              https://manager_http;
            proxy_cache_valid       200 1h;
            add_header              Cache-Control "public, max-age=3600";
        }

        # ── Health check (used by upstream monitoring) ─────────────────────
        location /health {
            proxy_pass              https://manager_http;
            proxy_read_timeout      5s;
            access_log              off;
        }

        # ── Root (dashboard SPA) ───────────────────────────────────────────
        location / {
            proxy_pass              https://manager_http;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
        }
    }
}
